    --warm:    #EDE9E0;
    --mid:     #6B7385;
    --border:  rgba(196,154,60,0.22);
    --border2: rgba(11,22,40,0.10);
    --ff-head: 'Playfair Display', Georgia, serif;
    --ff-body: 'DM Sans', sans-serif;
    --ff-mono: 'DM Mono', monospace;
    --ease:    cubic-bezier(0.22,1,0.36,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--ff-body);
    background: var(--cream);
    color: var(--navy);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  img { display: block; max-width: 100%; }
  a   { text-decoration: none; color: inherit; }

  /* ── UTILITIES ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .section-label {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 28px;
    height: 1px;
    background: var(--gold);
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    border-bottom: 1px solid transparent;
    transition: all 0.4s var(--ease);
    padding: 24px 0;
  }
  nav.scrolled {
    background: rgba(7, 14, 27, 0.97);
    backdrop-filter: blur(12px);
    border-bottom-color: var(--border);
    padding: 14px 0;
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }
  .nav-logo {
    font-family: var(--ff-head);
    font-size: 19px;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.72);
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #fff; }
  .nav-cta {
    background: var(--gold);
    color: var(--navy) !important;
    padding: 10px 22px;
    font-weight: 600 !important;
    font-size: 12px !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--gold2) !important; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: var(--navy);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(196,154,60,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(19,32,56,0.9) 0%, transparent 70%);
  }
  /* Subtle grid texture */
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(196,154,60,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(196,154,60,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Vertical rule accent */
  .hero-rule {
    position: absolute;
    left: 40px;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent 10%, var(--gold) 40%, var(--gold) 60%, transparent 90%);
    opacity: 0.25;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 180px 40px 90px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .hero-eyebrow {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.2s forwards;
  }

  .hero-h1 {
    font-family: var(--ff-head);
    font-size: clamp(44px, 6vw, 80px);
    font-weight: 700;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -0.01em;
    max-width: 820px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.9s var(--ease) 0.35s forwards;
  }
  .hero-h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    max-width: 520px;
    line-height: 1.65;
    margin-bottom: 52px;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.9s var(--ease) 0.5s forwards;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.9s var(--ease) 0.65s forwards;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    padding: 16px 36px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.25s var(--ease);
    border: 2px solid var(--gold);
  }
  .btn-primary:hover {
    background: var(--gold2);
    border-color: var(--gold2);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(196,154,60,0.3);
  }

  .btn-ghost {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .btn-ghost:hover { color: #fff; border-bottom-color: var(--gold); }
  .btn-ghost::after { content: '→'; }

  /* Stats strip */
  .hero-stats {
    position: relative;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(4px);
    opacity: 0;
    animation: fadeUp 0.9s var(--ease) 0.8s forwards;
  }
  .hero-stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .stat-item {
    padding: 32px 0 32px 40px;
    border-left: 1px solid rgba(255,255,255,0.06);
  }
  .stat-item:first-child { border-left: none; padding-left: 0; }
  .stat-num {
    font-family: var(--ff-head);
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-num span { color: var(--gold); }
  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── SOCIAL PROOF BAND ── */
  .clients {
    background: var(--warm);
    padding: 48px 0;
    border-top: 1px solid var(--border2);
    border-bottom: 1px solid var(--border2);
    overflow: hidden;
  }
  .clients-label {
    text-align: center;
    font-family: var(--ff-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .clients-logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 56px;
    flex-wrap: wrap;
    padding: 0 40px;
  }
  .client-logo {
    height: 28px;
    opacity: 0.45;
    filter: grayscale(1);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    font-family: var(--ff-head);
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.04em;
  }
  .client-logo:hover { opacity: 0.75; filter: grayscale(0); }

  /* ── DIAGNOSTIC SECTION ── */
  .diagnostic {
    padding: 120px 0;
    background: var(--cream);
  }
  .diagnostic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .diag-left h2 {
    font-family: var(--ff-head);
    font-size: clamp(32px, 4vw, 50px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--navy);
    margin-bottom: 24px;
  }
  .diag-left h2 em {
    font-style: italic;
    color: var(--gold);
  }
  .diag-left p {
    color: var(--mid);
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 36px;
    font-weight: 300;
  }
  .diag-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--navy);
    border-bottom: 2px solid var(--gold);
    padding-bottom: 4px;
    transition: gap 0.2s;
  }
  .diag-link:hover { gap: 16px; }
  .diag-link::after { content: '→'; }

  .diag-items { display: flex; flex-direction: column; gap: 4px; }
  .diag-item {
    padding: 24px 28px;
    border: 1px solid var(--border2);
    background: #fff;
    cursor: default;
    transition: all 0.25s var(--ease);
    position: relative;
  }
  .diag-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.3s var(--ease);
    transform-origin: bottom;
  }
  .diag-item:hover { transform: translateX(4px); box-shadow: 0 4px 24px rgba(11,22,40,0.06); }
  .diag-item:hover::before { transform: scaleY(1); }
  .diag-item h4 {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .diag-item p {
    font-size: 13px;
    color: var(--mid);
    margin: 0;
    line-height: 1.5;
  }

  /* ── SERVICES ── */
  .services {
    padding: 120px 0;
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }
  .services::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.3;
  }
  .services-header {
    margin-bottom: 72px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 40px;
  }
  .services-header h2 {
    font-family: var(--ff-head);
    font-size: clamp(32px, 4vw, 50px);
    color: #fff;
    line-height: 1.1;
  }
  .services-header h2 em { font-style: italic; color: var(--gold); }
  .services-header p {
    max-width: 360px;
    color: rgba(255,255,255,0.5);
    font-size: 15px;
    line-height: 1.65;
    font-weight: 300;
    text-align: right;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .service-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 48px 40px;
    position: relative;
    transition: all 0.35s var(--ease);
    overflow: hidden;
  }
  .service-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(196,154,60,0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-4px); }
  .service-card:hover::after { opacity: 1; }
  .service-num {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-bottom: 28px;
  }
  .service-card h3 {
    font-family: var(--ff-head);
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .service-card p {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    line-height: 1.65;
    margin-bottom: 28px;
    font-weight: 300;
  }
  .service-bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }
  .service-bullets li {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .service-bullets li::before {
    content: '—';
    color: var(--gold);
    flex-shrink: 0;
    font-family: var(--ff-mono);
  }
  .service-link {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: gap 0.2s;
  }
  .service-link:hover { gap: 14px; }
  .service-link::after { content: '→'; }

  /* ── METHODOLOGY ── */
  .methodology {
    padding: 120px 0;
    background: var(--cream);
  }
  .method-header { margin-bottom: 80px; max-width: 640px; }
  .method-header h2 {
    font-family: var(--ff-head);
    font-size: clamp(32px, 4vw, 50px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--navy);
    margin-bottom: 20px;
  }
  .method-header h2 em { font-style: italic; color: var(--gold); }
  .method-header p {
    font-size: 16px;
    color: var(--mid);
    line-height: 1.7;
    font-weight: 300;
  }
  .method-steps {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    border-top: 1px solid var(--border2);
  }
  .method-step {
    padding: 40px 32px 40px 0;
    border-right: 1px solid var(--border2);
    transition: all 0.25s;
    position: relative;
  }
  .method-step:last-child { border-right: none; padding-right: 0; }
  .method-step::after {
    content: '';
    position: absolute;
    top: -1px; left: 0;
    width: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.4s var(--ease);
  }
  .method-step:hover::after { width: 100%; }
  .step-num {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-bottom: 20px;
  }
  .method-step h4 {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .method-step p {
    font-size: 13px;
    color: var(--mid);
    line-height: 1.6;
    font-weight: 300;
  }

  /* ── RESULTS / CASES ── */
  .results {
    padding: 120px 0;
    background: var(--warm);
  }
  .results-header {
    margin-bottom: 64px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 40px;
  }
  .results-header h2 {
    font-family: var(--ff-head);
    font-size: clamp(32px, 4vw, 50px);
    color: var(--navy);
    line-height: 1.1;
  }
  .results-header h2 em { font-style: italic; color: var(--gold); }

  .cases-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .case-card {
    background: #fff;
    border: 1px solid var(--border2);
    padding: 48px;
    position: relative;
    transition: all 0.3s var(--ease);
  }
  .case-card:first-child {
    grid-row: span 2;
    background: var(--navy);
    border-color: transparent;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .case-card:hover { box-shadow: 0 16px 48px rgba(11,22,40,0.08); transform: translateY(-3px); }
  .case-card:first-child:hover { transform: translateY(-3px); }

  .case-tag {
    font-family: var(--ff-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .case-card:not(:first-child) .case-tag { color: var(--mid); }

  .case-challenge {
    font-size: 11px;
    font-family: var(--ff-mono);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .case-card:not(:first-child) .case-challenge { color: var(--mid); }

  .case-title {
    font-family: var(--ff-head);
    font-size: 26px;
    color: #fff;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  .case-card:not(:first-child) .case-title { color: var(--navy); font-size: 20px; }

  .case-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.65;
    font-weight: 300;
    margin-bottom: 40px;
  }
  .case-card:not(:first-child) .case-desc { color: var(--mid); }

  .case-metrics {
    display: flex;
    gap: 32px;
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .metric-num {
    font-family: var(--ff-head);
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .case-card:not(:first-child) .metric-num { font-size: 28px; color: var(--navy); }
  .metric-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--ff-mono);
  }
  .case-card:not(:first-child) .metric-label { color: var(--mid); }

  .case-quote {
    font-family: var(--ff-head);
    font-style: italic;
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 24px;
  }
  .case-quote cite {
    display: block;
    margin-top: 12px;
    font-family: var(--ff-body);
    font-style: normal;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .case-small-quote {
    font-family: var(--ff-head);
    font-style: italic;
    font-size: 14px;
    color: var(--mid);
    line-height: 1.6;
    border-top: 1px solid var(--border2);
    padding-top: 20px;
    margin-top: 20px;
  }
  .case-small-quote cite {
    display: block;
    margin-top: 8px;
    font-family: var(--ff-body);
    font-style: normal;
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.04em;
  }

  /* ── MARIA SECTION ── */
  .maria {
    padding: 120px 0;
    background: var(--cream);
    overflow: hidden;
  }
  .maria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    align-items: center;
  }
  .maria-img-wrap {
    position: relative;
  }
  .maria-img-frame {
    position: relative;
    background: var(--navy);
    overflow: hidden;
    aspect-ratio: 4/5;
  }
  .maria-img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    mix-blend-mode: luminosity;
    opacity: 0.85;
  }
  .maria-img-accent {
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 60%;
    aspect-ratio: 1;
    border: 1px solid var(--gold);
    opacity: 0.2;
    z-index: -1;
  }
  .maria-credential-badge {
    position: absolute;
    bottom: 32px;
    left: -24px;
    background: #fff;
    border: 1px solid var(--border2);
    padding: 20px 24px;
    box-shadow: 0 8px 32px rgba(11,22,40,0.12);
  }
  .badge-title {
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: var(--ff-mono);
  }
  .badge-body {
    font-family: var(--ff-head);
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.4;
  }

  .maria-content h2 {
    font-family: var(--ff-head);
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 700;
    color: var(--navy);
    line-height: 1.1;
    margin-bottom: 28px;
  }
  .maria-content h2 em { font-style: italic; color: var(--gold); }
  .maria-content .lead {
    font-size: 17px;
    color: var(--navy);
    line-height: 1.65;
    font-weight: 400;
    margin-bottom: 20px;
  }
  .maria-content p {
    font-size: 15px;
    color: var(--mid);
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 16px;
  }
  .maria-creds {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 36px 0;
    border-left: 2px solid var(--gold);

    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;

  .footer-col ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .footer-col a {
    font-size: 13px;
    color: rgba(255,255,255,0.45);

  }
  .footer-col a:hover { color: #fff; }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.06);

    justify-content: space-between;
    align-items: center;

  .footer-bottom p {

    align-items: center;

    letter-spacing: 0.08em;

  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(28px);

  }
  .reveal.visible {
    opacity: 1;
    transform: none;
  }

  .wa-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 52px; height: 52px;

    align-items: center;
    justify-content: center;

  /* ── RESPONSIVE ── */

    .services-header { flex-direction: column; align-items: flex-start; }
    .services-header p { text-align: left; }
    .results-header { flex-direction: column; align-items: flex-start; }
    .method-steps { grid-template-columns: 1fr; }
    .footer-top { grid-template-columns: 1fr; }
    .maria-credential-badge { left: 0; }
  }
